app = "cobros-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3005"
  DB_PORT = "5432"
  DB_NAME = "cobrosdb"
  DB_SSL = "true"
  DB_SSL_REJECT_UNAUTHORIZED = "false"
  CORS_ORIGIN = "*"
  JSON_BODY_LIMIT = "1mb"
  LOG_REQUESTS = "true"

[http_service]
  internal_port = 3005
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/api/cobros/health"
